name: ai_taskbot
description: AI Personal Task Bot
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.2.0
  firebase_messaging: ^15.0.4
  google_sign_in: ^6.2.1
  animate_do: ^3.3.4
  lottie: ^3.1.2
  google_fonts: ^6.2.1
  curved_navigation_bar: ^1.0.3
  flutter_slidable: ^3.1.0
  flutter_local_notifications: ^17.2.1
  intl: ^0.19.0
  http: ^1.2.0
  timezone: ^0.9.4
  flutter_native_splash: ^2.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0E2A"
  adaptive_icon_foreground: "assets/logo.png"
  web:
    generate: false
  windows:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

  

    